  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #000;
      min-height: 100vh;
      display: flex; flex-direction: column; align-items: center;
      padding: 20px; color: #fff;
    }
    h1 { font-size: 1.8rem; text-align: center; margin-bottom: 6px; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
    .subtitle { font-size: 0.85rem; opacity: 0.75; margin-bottom: 20px; text-align: center; }

    /* ===== 選択画面 ===== */
    #select-screen { width: 100%; max-width: 600px; }

    .step-header {
      text-align: center;
      margin-bottom: 20px;
    }
    .step-label {
      font-size: 0.8rem; opacity: 0.6; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 6px;
    }
    .step-count {
      font-size: 1.4rem; font-weight: bold;
    }
    .step-progress-wrap {
      background: rgba(255,255,255,0.15); border-radius: 20px; height: 8px; margin: 10px auto 0; max-width: 300px; overflow: hidden;
    }
    .step-progress-bar {
      height: 100%; background: #f5a623; border-radius: 20px; transition: width 0.4s;
    }

    .group-card {
      background: rgba(255,255,255,0.12); border-radius: 16px; padding: 20px;
      animation: slideIn 0.3s ease;
    }
    @keyframes slideIn { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }

    .group-question { font-size: 1rem; font-weight: bold; margin-bottom: 16px; text-align: center; opacity: 0.9; }

    .options-list { display: flex; flex-direction: column; gap: 10px; }
    .option-btn {
      background: rgba(255,255,255,0.15);
      border: 2px solid transparent; border-radius: 10px;
      color: #fff; padding: 14px 16px; font-size: 0.88rem;
      cursor: pointer; text-align: left; transition: all 0.15s; line-height: 1.4;
      width: 100%;
    }
    .option-btn:hover { background: rgba(255,255,255,0.28); border-color: rgba(255,255,255,0.3); }
    .option-btn.selected {
      background: #f5a623; color: #1a1a1a; border-color: #fff; font-weight: bold;
      cursor: default;
    }
    .option-btn.locked { opacity: 0.4; cursor: default; }

    .share-area {
      margin-top: 24px; text-align: center;
    }
    .share-area p { font-size: 0.8rem; opacity: 0.7; margin-bottom: 8px; }
    .share-box-sm {
      background: rgba(255,255,255,0.12); border-radius: 8px;
      padding: 8px 12px; display: flex; align-items: center; gap: 8px;
    }
    .share-box-sm input { flex: 1; background: transparent; border: none; color: #fff; font-size: 0.8rem; outline: none; }
    .copy-btn-sm { background: rgba(255,255,255,0.2); color: #fff; border: none; border-radius: 6px; padding: 5px 12px; font-size: 0.78rem; cursor: pointer; white-space: nowrap; }
    .copy-btn-sm:hover { background: rgba(255,255,255,0.38); }

    .start-area { text-align: center; margin-top: 24px; padding-bottom: 40px; }
    .start-btn {
      background: #f5a623; color: #1a1a1a; border: none; border-radius: 10px;
      padding: 14px 48px; font-size: 1.1rem; font-weight: bold; cursor: pointer;
      transition: all 0.2s;
    }
    .start-btn:hover { background: #e6921a; transform: translateY(-2px); }

    /* ===== プレイ画面 ===== */
    #play-screen { display: none; width: 100%; max-width: 600px; flex-direction: column; align-items: center; }
    .play-controls { display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; justify-content: center; }
    .ctrl-btn { background: rgba(255,255,255,0.15); color: #fff; border: none; border-radius: 8px; padding: 8px 18px; font-size: 0.85rem; cursor: pointer; }
    .ctrl-btn:hover { background: rgba(255,255,255,0.28); }
    .task-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; width: 100%; }
    .task-cell { background: rgba(255,255,255,0.13); border-radius: 10px; padding: 14px 8px; text-align: center; font-size: 0.78rem; cursor: pointer; border: 2px solid transparent; transition: all 0.15s; line-height: 1.4; min-height: 70px; display: flex; align-items: center; justify-content: center; }
    .task-cell:hover { background: rgba(255,255,255,0.22); transform: scale(1.02); }
    .task-cell.done { background: #f5a623; color: #1a1a1a; font-weight: bold; border-color: #fff; }
    .goal-count { font-size: 1rem; margin: 0 0 8px; opacity: 0.85; }
    .goal-progress { background: rgba(255,255,255,0.15); border-radius: 20px; height: 12px; width: 100%; margin-bottom: 14px; overflow: hidden; }
    .goal-bar { height: 100%; background: #f5a623; border-radius: 20px; transition: width 0.4s; }
    .goal-banner { font-size: 2rem; font-weight: bold; color: #f5a623; text-shadow: 0 0 20px rgba(245,166,35,0.8); margin: 10px 0; display: none; animation: pulse 1s ease-in-out infinite; }
    @keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.08); } }

    #loading { font-size: 1.1rem; opacity: 0.8; margin: 40px; text-align: center; display: none; }
    #error-msg { color: #ff8888; margin: 8px; font-size: 0.9rem; text-align: center; min-height: 18px; }

    .new-game-btn {
      background: rgba(255,255,255,0.15); color: #fff; border: none; border-radius: 8px;
      padding: 8px 18px; font-size: 0.85rem; cursor: pointer; margin-bottom: 14px;
    }
    .new-game-btn:hover { background: rgba(255,255,255,0.28); }
  </style>

      { name: "ユニークレベルからの2ステージから蝶の青コイン", jp: "2ステージから蝶の青コイン" },
      { name: "ヨッシーに乗って3つのレベルを駆け抜けよう", jp: "ドルピックタウン以外の3つのステージでヨッシーに乗る" },
      { name: "3 Hidden Reds Hoverless", jp: "ヒミツ赤コイン3枚ホバー禁止" },
      { name: "ビアンコシャドウマリオ", jp: "ビアンコヒルズのニセマリオ撃破" },
      { name: "5 Unique Boss Shines", jp: "ボス5種類撃破" },
    ],
    [
      { name: "Eel Shine", jp: "ウナギ撃破（マーレ4）" },
      { name: "ジェラートに乗ってヨッシー", jp: "マンマビーチのヨッシーに乗る" },
      { name: "Sirena 8 Shine", jp: "シレナビーチストーリー8" },
      { name: "単一レベルの青コイン 30 枚すべて", jp: "1ステージから青コイン30枚取得" },
      { name: "25 Noki Blue Coins", jp: "マーレのいりえの青コイン25枚" },
      { name: "3 つのターボ ノズルのロック解除", jp: "ターボノズル3つ解放" },
      { name: "8 Red Coin Shines", jp: "赤コインのシャイン8枚" },
    ],
  ];

  const API = 'https://6a05e0376d3f2c74d06264f4.base44.app/functions/bingoRoom';

  // 状態
  let currentGroups = [];   // 今回の15グループ（各3択）
  let selections = [];      // 選んだtask.name の配列（順番に積む）
  let taskNameMap = {};     // name -> jp
  let currentRoom = null;
  let localChecked = [];
  let pollInterval = null;

  // ===== ユーティリティ =====
  let currentSeed = null;

  // Mulberry32 疑似乱数生成器
  function mulberry32(seed) {
    return function() {
      seed |= 0; seed = seed + 0x6D2B79F5 | 0;
      let t = Math.imul(seed ^ seed >>> 15, 1 | seed);
      t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
      return ((t ^ t >>> 14) >>> 0) / 4294967296;
    };
  }

  let rng = Math.random; // デフォルトはMath.random

  function shuffle(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(rng() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  // キーワード排他ルール: 同じキーワードを含むお題が複数グループにあっても1グループだけ出現
  const EXCLUSIVE_KEYWORDS = [
    "残機",
    "青コイン合計",
    "M字から青コイン",
    "アルバイトの青コイン",
    "赤コインのシャイン",
    "ヒミツステージのシャイン",
    "ドルピックタウンのシャイン",
    "双子ラクガキの青コイン",
    "ドルピックタウンの青コイン",
    "青い鳥の青コイン",
    "シャイン\d+枚",  // 「シャイン○枚」系（合計枚数指定）
  ];

  // グループがキーワードを含むか判定
  function groupMatchesKeyword(group, kw) {
    const re = new RegExp(kw);
    return group.some(task => re.test(task.jp));
  }

  function pickGroups() {
    const totalGroups = ALL_TASK_GROUPS.length;
    const allIndices = Array.from({length: totalGroups}, (_, i) => i);
    const usedIndices = new Set();
    const selected = [];

    // キーワードごとに排他処理: 該当グループから1つだけ選び残りを除外
    for (const kw of EXCLUSIVE_KEYWORDS) {
      const matching = allIndices.filter(i => !usedIndices.has(i) && groupMatchesKeyword(ALL_TASK_GROUPS[i], kw));
      if (matching.length === 0) continue;
      const chosen = shuffle(matching)[0];
      // 該当キーワードを持つ全グループを使用済みに
      matching.forEach(i => usedIndices.add(i));
      selected.push(chosen);
      if (selected.length >= 15) break;
    }

    // 残りの枠を制約のないグループで埋める
    const remaining = shuffle(allIndices.filter(i => !usedIndices.has(i)));
    let ri = 0;
    while (selected.length < 15 && ri < remaining.length) {
      selected.push(remaining[ri++]);
    }

    return shuffle(selected).map(i => {
      const group = shuffle(ALL_TASK_GROUPS[i]);
      // 「青コイン合計」系は3択に最大1つ
      const blueTotal = group.filter(t => t.jp.includes('青コイン合計'));
      const others = group.filter(t => !t.jp.includes('青コイン合計'));
      const picked = [];
      if (blueTotal.length > 0) picked.push(blueTotal[0]);
      for (const t of others) {
        if (picked.length >= 3) break;
        picked.push(t);
      }
      // 3つ未満なら残りのblueTotalで補完
      for (let j = 1; j < blueTotal.length && picked.length < 3; j++) {
        picked.push(blueTotal[j]);
      }
      return shuffle(picked).slice(0, 3);
    });
  }

  // グループデータ → URLパラメータ（グループのインデックスと各3択のインデックスをエンコード）
  function groupsToParam(groups) {
    // 各グループについて、元の ALL_TASK_GROUPS のどのグループか + 選ばれた3つのインデックスを記録
    const encoded = groups.map(group => {
      // 元グループを特定
      const srcIdx = ALL_TASK_GROUPS.findIndex(g => g.some(t => t.name === group[0].name));
      const src = ALL_TASK_GROUPS[srcIdx];
      const picks = group.map(t => src.findIndex(s => s.name === t.name));
      return srcIdx + ':' + picks.join(',');
    });
    return encoded.join(';');
  }

  function paramToGroups(param) {
    try {
      return param.split(';').map(part => {
        const [gi, picksStr] = part.split(':');
        const src = ALL_TASK_GROUPS[+gi];
        return picksStr.split(',').map(pi => src[+pi]);
      });
    } catch(e) { return null; }
  }

  async function api(body) {
    try {
      const res = await fetch(API, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });
      if (!res.ok) throw new Error('HTTP ' + res.status);
      return res.json();
    } catch(e) { return { ok: false, error: e.message }; }
  }

  function showError(msg) { document.getElementById('error-msg').textContent = msg || ''; }

  // ===== 初期化 =====
  function init() {
    const params = new URLSearchParams(window.location.search);
    const gParam = params.get('g');
    if (gParam) {
      const groups = paramToGroups(gParam);
      if (groups && groups.length === 15) {
        currentGroups = groups;
        buildTaskNameMap();
        selections = [];
        renderSelectStep();
        return;
      }
    }
    const seedParam = params.get('seed');
    if (seedParam && !isNaN(+seedParam)) {
      startNewGame(+seedParam);
    } else {
      startNewGame();
    }
  }

  function applySeed() {
    const val = parseInt(document.getElementById('seed-input').value, 10);
    if (isNaN(val)) { alert('有効なシード値を入力してください'); return; }
    startNewGame(val);
  }

  function buildTaskNameMap() {
    taskNameMap = {};
    currentGroups.forEach(g => g.forEach(t => { taskNameMap[t.name] = t.jp; }));
  }

  // ===== 新しいチャレンジ =====
  function startNewGame(seedOverride) {
    if (pollInterval) clearInterval(pollInterval);
    currentSeed = seedOverride !== undefined ? seedOverride : Math.floor(Math.random() * 1000000);
    rng = mulberry32(currentSeed);
    currentGroups = pickGroups();
    buildTaskNameMap();
    selections = [];
    currentRoom = null;
    localChecked = [];

    // URLにグループ情報を乗せる
    const url = new URL(window.location.href);
    url.searchParams.set('g', groupsToParam(currentGroups));
    url.searchParams.delete('room');
    window.history.replaceState({}, '', url.toString());

    renderSelectStep();
  }

  // ===== 選択画面（1ステップずつ） =====
  function renderSelectStep() {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('play-screen').style.display = 'none';
    document.getElementById('select-screen').style.display = 'block';

    const stepIdx = selections.length; // 次に選ぶグループのインデックス
    const screen = document.getElementById('select-screen');
    screen.innerHTML = '';

    // 新しいチャレンジボタン（選択画面の最初に表示）
    const newGameBtn = document.createElement('button');
    newGameBtn.className = 'new-game-btn';
    newGameBtn.style.display = 'block';
    newGameBtn.style.marginBottom = '16px';
    newGameBtn.textContent = '🔀 新しいチャレンジを作る';
    newGameBtn.onclick = () => startNewGame();
    screen.appendChild(newGameBtn);

    // ステップヘッダー
    const header = document.createElement('div');
    header.className = 'step-header';
    header.innerHTML = `
      <div class="step-label">お題選択</div>
      <div class="step-count">${stepIdx} / 15 選択済み</div>
      <div class="step-progress-wrap">
        <div class="step-progress-bar" style="width:${stepIdx/15*100}%"></div>
      </div>
    `;
    screen.appendChild(header);

    // シード値表示・入力エリア（ステップ0のみ表示）
    if (stepIdx === 0) {
      const seedArea = document.createElement('div');
      seedArea.style.cssText = 'display:flex;align-items:center;gap:10px;margin:10px 0 16px;background:rgba(255,255,255,0.08);padding:10px 14px;border-radius:10px;flex-wrap:wrap;';
      seedArea.innerHTML = `
        <span style="color:#aaa;font-size:0.82rem;white-space:nowrap;">🎲 シード値:</span>
        <strong style="color:#fff;font-size:1rem;letter-spacing:1px;">${currentSeed}</strong>
        <span style="color:#aaa;font-size:0.78rem;flex:1;min-width:120px;">このシード値を入力すると同じお題セットを再現できます</span>
        <input type="number" id="seed-input" placeholder="シード値を入力" value=""
          style="width:130px;background:rgba(255,255,255,0.12);border:1px solid rgba(255,255,255,0.25);border-radius:7px;color:#fff;padding:5px 9px;font-size:0.85rem;outline:none;">
        <button onclick="applySeed()" style="background:#3a7bd5;color:#fff;border:none;border-radius:7px;padding:5px 13px;font-size:0.85rem;cursor:pointer;">再現</button>
      `;
      screen.appendChild(seedArea);
    }

    if (stepIdx >= 15) {
      // 全部選び終わった → スタートボタン
      const startArea = document.createElement('div');
      startArea.className = 'start-area';
      startArea.innerHTML = `<button class="start-btn" onclick="launchGame()">🎮 スタート！</button>`;
      screen.appendChild(startArea);
      return;
    }

    // 現在のグループカード
    const group = currentGroups[stepIdx];
    const card = document.createElement('div');
    card.className = 'group-card';
    card.style.marginTop = '20px';

    const q = document.createElement('div');
    q.className = 'group-question';
    q.textContent = `グループ ${stepIdx + 1} のお題を選んでください`;
    card.appendChild(q);

    const optList = document.createElement('div');
    optList.className = 'options-list';
    group.forEach(task => {
      const btn = document.createElement('button');
      btn.className = 'option-btn';
      btn.textContent = task.jp;
      btn.title = task.name;
      btn.onclick = () => selectOption(task.name);
      optList.appendChild(btn);
    });
    card.appendChild(optList);
    screen.appendChild(card);

    // 既に選んだ一覧（折りたたみ）
    if (stepIdx > 0) {
      const past = document.createElement('div');
      past.style.cssText = 'margin-top:20px; opacity:0.55; font-size:0.78rem; text-align:center;';
      past.textContent = `選択済み: ${selections.map((n,i) => `${i+1}.${taskNameMap[n]||n}`).join(' / ')}`;
      screen.appendChild(past);
    }
  }

  function selectOption(taskName) {
    selections.push(taskName);
    if (selections.length < 15) {
      renderSelectStep();
    } else {
      // 全部選んだ
      renderSelectStep(); // スタートボタンを表示
    }
  }

  // ===== ゲーム起動 =====
  async function launchGame() {
    document.getElementById('loading').style.display = 'block';
    document.getElementById('select-screen').style.display = 'none';
    showError('');

    const data = await api({ action: 'create', selected_tasks: selections });
    if (data.ok) {
      currentRoom = data.room;
      renderPlay(data.room);
    } else {
      // オフラインフォールバック
      document.getElementById('loading').style.display = 'none';
      localChecked = new Array(15).fill(false);
      renderPlayLocal();
    }
  }

  // ===== プレイ画面（オンライン） =====
  function renderPlay(room) {
    currentRoom = room;
    document.getElementById('loading').style.display = 'none';
    document.getElementById('select-screen').style.display = 'none';
    document.getElementById('play-screen').style.display = 'flex';

    const done = room.checked.filter(Boolean).length;
    document.getElementById('goal-count').textContent = `${done} / 15 完了`;
    document.getElementById('goal-bar').style.width = (done / 15 * 100) + '%';
    document.getElementById('goal-banner').style.display = done === 15 ? 'block' : 'none';

    const grid = document.getElementById('task-grid');
    grid.innerHTML = '';
    room.card.forEach((taskName, i) => {
      const cell = document.createElement('div');
      cell.className = 'task-cell' + (room.checked[i] ? ' done' : '');
      cell.textContent = taskNameMap[taskName] || taskName;
      cell.onclick = () => toggleTask(i);
      grid.appendChild(cell);
    });

    startPolling(room.room_code);
  }

  // ===== プレイ画面（オフライン） =====
  function renderPlayLocal() {
    document.getElementById('play-screen').style.display = 'flex';
    const done = localChecked.filter(Boolean).length;
    document.getElementById('goal-count').textContent = `${done} / 15 完了`;
    document.getElementById('goal-bar').style.width = (done / 15 * 100) + '%';
    document.getElementById('goal-banner').style.display = done === 15 ? 'block' : 'none';

    const grid = document.getElementById('task-grid');
    grid.innerHTML = '';
    selections.forEach((taskName, i) => {
      const cell = document.createElement('div');
      cell.className = 'task-cell' + (localChecked[i] ? ' done' : '');
      cell.textContent = taskNameMap[taskName] || taskName;
      cell.onclick = () => {
        localChecked[i] = !localChecked[i];
        renderPlayLocal();
      };
      grid.appendChild(cell);
    });
  }

  async function toggleTask(index) {
    if (!currentRoom) return;
    const data = await api({ action: 'toggle', room_code: currentRoom.room_code, index });
    if (data.ok) renderPlay(data.room);
  }

  async function resetChecks() {
    if (!currentRoom) {
      localChecked = new Array(15).fill(false);
      renderPlayLocal(); return;
    }
    for (let i = 0; i < 15; i++) {
      if (currentRoom.checked[i]) await api({ action: 'toggle', room_code: currentRoom.room_code, index: i });
    }
    const data = await api({ action: 'get', room_code: currentRoom.room_code });
    if (data.ok) renderPlay(data.room);
  }

  function startPolling(code) {
    if (pollInterval) clearInterval(pollInterval);
    pollInterval = setInterval(async () => {
      const data = await api({ action: 'get', room_code: code });
      if (data.ok) {
        const prev = JSON.stringify(currentRoom.checked);
        if (prev !== JSON.stringify(data.room.checked)) renderPlay(data.room);
      }
    }, 3000);
  }

  function copyShareUrl() {
    const v = document.getElementById('share-url-input').value;
    navigator.clipboard.writeText(v)
      .then(() => alert('URLをコピーしました！🌊'))
      .catch(() => { document.getElementById('share-url-input').select(); document.execCommand('copy'); alert('コピーしました！'); });
  }

  init();
  </script>
